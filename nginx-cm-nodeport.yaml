apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html:
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8" />
        <title>Hello from KinD</title>
      </head>
      <body>
        <h1>Hakuna Matata — your NGINX page is live 🎉</h1>
        <p>Served from a Kubernetes ConfigMap, running on KinD.</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            # Replace the default index.html with our ConfigMap's index.html
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: html
          configMap:
            name: nginx-html
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
