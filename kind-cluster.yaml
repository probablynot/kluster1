kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: fluxcd-test
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30080
    hostPort: 30080
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 30081
    hostPort: 30081
    listenAddress: "127.0.0.1"
    protocol: TCP
  - containerPort: 30443
    hostPort: 30443
    listenAddress: "127.0.0.1"
    protocol: TCP
